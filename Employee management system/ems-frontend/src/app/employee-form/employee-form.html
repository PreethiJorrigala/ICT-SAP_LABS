<h2>{{ id ? 'Update Employee' : 'Add Employee' }}</h2>

<form (ngSubmit)="save()" #empForm="ngForm">

    Name:
    <input type="text" [(ngModel)]="employee.name" name="name" required>
    <br>

    Email:
    <input type="email" [(ngModel)]="employee.email" name="email" required>
    <br>


    Salary:
    <input type="number" [(ngModel)]="employee.salary" name="salary" required>
    <br><br>

    <button type="submit" [disabled]="empForm.invalid">Save</button>
</form>
